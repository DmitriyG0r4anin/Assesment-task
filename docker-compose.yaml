services:
  broker:
    image: confluentinc/cp-kafka:8.0.0
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENERS: "PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  # A lightweight web UI for inspecting Kafka topics, partitions and messages.
  control-center:
    image: obsidiandynamics/kafdrop:3.27.0
    container_name: control-center
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "broker:29092"
      JVM_OPTS: "-Xms64M -Xmx512M"
    depends_on:
      - broker
    restart: unless-stopped

  weak-app:
    hostname: weak-app
    build:
      context: ./WeakApp
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  data-ingestor:
    build:
      context: ./DataIngestor
      dockerfile: Dockerfile
    depends_on:
      - broker
      - weak-app
    environment:
      WEAKAPP_URL: ${WEAKAPP_URL:-http://weak-app:8080}
      WEAKAPP_API_KEY: ${WEAKAPP_API_KEY}

      KAFKA_TOPIC: ${KAFKA_TOPIC:-meter-data}
      POLL_INTERVAL: ${POLL_INTERVAL:-5m}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-broker:29092}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT}
      INITIAL_BACKOFF: ${INITIAL_BACKOFF}
      MAX_BACKOFF: ${MAX_BACKOFF}
    restart: unless-stopped

  # data-processor:

  # graphql-api-gateway:

  # notification:

  # frontend:
