name: GraphQL API Gateway - Build & Analyze

on:
  push:
    branches:
      - main
    paths:
      - "GraphQLAPIGateway/**"
      - ".github/workflows/graphql-api-gateway.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "GraphQLAPIGateway/**"
      - ".github/workflows/graphql-api-gateway.yml"

jobs:
  analyze:
    name: Build & Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GraphQLAPIGateway

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: GraphQLAPIGateway
          
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: GraphQLAPIGateway

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t graphql-api-gateway:ci .
