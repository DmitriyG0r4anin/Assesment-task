name: DataIngestor - Build & Analyze

on:
  push:
    branches:
      - main
    paths:
      - "DataIngestor/**"
      - ".github/workflows/data-ingestor.yml"

  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "DataIngestor/**"
      - ".github/workflows/data-ingestor.yml"

jobs:
  analyze:
    name: Build & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.0"
          projectBaseDir: DataIngestor

      - name: Run go tests (generate coverage)
        working-directory: DataIngestor
        run: |
          go test ./... -coverprofile=coverage.out

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: DataIngestor

        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: sonarqube
    defaults:
      run:
        working-directory: DataIngestor

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t data-ingestor:ci .
