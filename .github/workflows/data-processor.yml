name: Build & Analyze DataProcessor service

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sonar Scan
        uses: highbyte/sonarscan-dotnet@252f699a9c4e005bf3902d44a1c6c0aea43c678e
        with:
          sonarProjectKey: gh0stf1ghter_Assesment-task_DataProcessor
          sonarProjectName: gh0stf1ghter_Assesment-task_DataProcessor
          sonarOrganization: gh0stf1ghter
          dotnetBuildArguments: ./DataProcessor --configuration Release
          dotnetTestArguments: ./DataProcessor --no-build --configuration Release --verbosity normal --logger trx --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          sonarBeginArguments: /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" -d:sonar.cs.vstest.reportsPaths="**/TestResults/*.trx" /d:sonar.coverage.exclusions="${{env.EXCLUDE_FROM_COVERAGE}}" /d:sonar.exclusions="${{env.EXCLUDE_FROM_SONAR}}"
    env:
      EXCLUDE_FROM_COVERAGE: "**/Program.cs, **/DependencyInjection.cs, **/Entities/*, **/Models/*, **/Repositories/**, **/Mapping/*, **/Configuration/*, **/Messaging/*, **/Persistence/*"
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      EXCLUDE_FROM_SONAR: "**/Dockerfile"
